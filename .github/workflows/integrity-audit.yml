name: Continuous Integrity Audit (CIA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run automatically every 6 hours to detect tampering
    - cron: '0 */6 * * *'

jobs:
  audit-signatures:
    name: Cryptographic Signature Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: Verify ED25519 Signatures
        run: python audit_signatures.py
